name: Publish to npm

# Publishes opencode-sema to npm via Trusted Publishing (OIDC) — no token.
#
# npm whitelists this workflow's *filename* + repo for the package's trusted
# publisher. Configure once on npmjs.org: package opencode-sema -> repo
# sema-lisp/opencode-sema -> workflow `publish-npm.yml`.
#
# Trigger by pushing a `v*` tag (version taken from the tag).

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version --allow-same-version

      - name: Build
        run: npm run build

      - name: Publish
        run: npm publish --provenance --access public
