name: Publish to npm

# Publishes @sema-lang/opencode-sema to npm via Trusted Publishing (OIDC) — no token.
#
# npm whitelists this workflow's *filename* + repo for the package's trusted
# publisher, keyed on the PACKAGE NAME. Configure once on npmjs.org:
# package @sema-lang/opencode-sema -> repo sema-lisp/opencode-sema ->
# workflow `publish-npm.yml`. Because npm keys trusted publishing on the package
# name, the first publish of the scoped name must be done manually (or the
# trusted publisher must be (re)configured for @sema-lang/opencode-sema).
#
# Trigger by pushing a `v*` tag (version taken from the tag).

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "26"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version --allow-same-version

      - name: Build
        run: npm run build

      - name: Publish
        run: npm publish --provenance --access public
